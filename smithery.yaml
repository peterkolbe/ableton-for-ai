# Smithery configuration for ableton-for-ai MCP server
# See: https://smithery.ai/docs/config

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      stemsSourceDir:
        type: string
        description: "Path to the folder containing exported audio stems"
        default: "./stems"
      preferredAudioFormat:
        type: string
        description: "Audio format of your stems (wav or mp3)"
        enum: ["wav", "mp3"]
        default: "wav"
  commandFunction: |-
    (config) => ({
      command: "uv",
      args: ["--directory", ".", "run", "mcp_server_ableton.py"],
      env: {
        STEMS_SOURCE_DIR: config.stemsSourceDir || "./stems",
        PREFERRED_AUDIO_FORMAT: config.preferredAudioFormat || "wav"
      }
    })

